<!DOCTYPE html>
<html>
<head>
    <title>Mon App DevOps</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 50px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .container {
            background: rgba(255,255,255,0.9);
            color: #333;
            padding: 30px;
            border-radius: 20px;
            max-width: 600px;
            margin: auto;
        }
        button {
            background: #667eea;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 Projet DevOps</h1>
        <p>Déployé avec <strong>GitHub Actions</strong> sur <strong>Azure</strong></p>
        <p>Date: <span id="date"></span></p>
        <button onclick="alert('Félicitations! Le CI/CD fonctionne!')">Cliquez ici</button>
    </div>
    <script>
        document.getElementById('date').innerHTML = new Date().toLocaleString();
    </script>
</body>
</html>
