name: 02 - Build et Artefacts

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4
      
      - name: Créer un dossier de build
        run: mkdir -p build
      
      - name: Copier les fichiers
        run: cp index.html build/
      
      - name: Créer un fichier d'information
        run: |
          echo "Build effectué le $(date)" > build/info.txt
          echo "Commit: ${{ github.sha }}" >> build/info.txt
      
      - name: Upload des artefacts
        uses: actions/upload-artifact@v4
        with:
          name: mon-site-web
          path: build/