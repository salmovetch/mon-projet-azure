name: 03 - Tests Complets

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test-html:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Vérifier le titre
        run: |
          if grep -q "Projet DevOps" index.html; then
            echo "Titre trouvé"
          else
            echo "Titre non trouvé"
            exit 1
          fi
  
  test-files:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Vérifier l'existence des fichiers
        run: |
          if [ -f "index.html" ]; then
            echo "index.html existe"
            echo "Taille: $(wc -c < index.html) bytes"
          fi
  
  test-build:
    runs-on: ubuntu-latest
    needs: [test-html, test-files]
    steps:
      - uses: actions/checkout@v4
      
      - name: Simuler un build
        run: |
          echo "Build en cours..."
          sleep 5
          echo "Build réussi!"
  
  notification:
    runs-on: ubuntu-latest
    needs: [test-build]
    if: always()
    steps:
      - name: Résultat final
        run: echo "Tous les tests sont passés!"